spring.application.name=UPImesh
server.port=8080

# Postgres (running in Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/upimesh
spring.datasource.username=upimesh
spring.datasource.password=upimesh

# Let Flyway own the schema - Hibernate only validates, never auto-creates
spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true

# Redis (running in Docker)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Logging
logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Idempotency window
upi.mesh.idempotency-ttl-seconds=86400
upi.mesh.packet-max-age-seconds=86400